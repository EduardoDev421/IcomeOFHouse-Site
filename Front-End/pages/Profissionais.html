<head>

<body>
   <header class="topo">
      <div class="logo">
         <img src="" alt="Logo Income of Houses">

      <nav class="menu">
         <a href="../index.html">Início</a>
         <a href="../pages/Plantas.html">Plantas</a>

      <div class="iconelogin">

    <main class="pagina-profissionais">

        <section class="filtros">

            <h1>Encontre um profissional entre os nossos melhores</h1>

            <div class="linha-filtros">

                <div class="campo">
                    <label for="profissao">Profissão</label>
                    <select id="profissao">
                        <option value="">Todas</option>
                        <option value="Arquiteto">Arquiteto</option>
                        <option value="Arquiteta">Arquiteta</option>
                        <option value="Engenheiro Civil">Engenheiro Civil</option>
                        <option value="Designer de Interiores">Designer de Interiores</option>
                        <option value="Paisagista">Paisagista</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="estado">Estado:</label>
                    <Select type="text" id="estado" name="estado">
                        <option value="">Todas</option>
                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM">Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</	option>
                        <option value="PI">Piauí</	option>
                        <option value="RJ">Rio de Janeiro</	option>
                        <option value="RN">Rio Grande do Norte</	option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="SC">Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                        <option value="SE">Sergipe</option>
                        <option value="TO">Tocantins</option>
                    </Select>
                </div>

                <div class="campo">
                    <label for="experiencia">Experiência</label>
                    <select id="experiencia">
                        <option value="">Todas</option>
                        <option value="8 anos">8 anos</option>
                        <option value="9 anos">9 anos</option>
                        <option value="10 anos">10 anos</option>
                        <option value="12 anos">12 anos</option>
                        <option value="15 anos">15 anwos</option>
                        <option value="18 anos">18 anos</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="avaliacao">Avaliação</label>
                    <select id="avaliacao">
                        <option value="">Todas</option>
                        <option value="5">5.0</option>
                        <option value="4.9">4.9</option>
                        <option value="4.8">4.8</option>
                        <option value="4.7">4.7</option>
                    </select>
                </div>

                <button id="btnPesquisarProfissional">
                    Pesquisar
                </button>

            </div>

            <div class="cards-profissionais"> 
                
            </div>
