<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Profissional</title>

    <link rel="stylesheet" href="../css/PerfilProfissionais.css">
</head>

<body>

    <header class="topo">
        <div class="logo">
            <img src="" alt="Logo Income of Houses">
        </div>

        <nav class="menu">
            <a href="../index.html">Início</a>
            <a href="../pages/Plantas.html">Plantas</a>
            <a href="../pages/Profissionais.html" class="ativo">Profissionais</a>
            <a href="../pages/Sobre.html">Sobre</a>
        </nav>

        <div class="iconelogin">
            <img src="" alt="Ícone Login">
        </div>
    </header>

    <main>

        <section class="perfil-profissional">

            <a href="Profissionais.html" class="voltar">← Voltar para profissionais</a>

            <div class="perfil-container">

                <div class="foto-profissional">
                    <img id="imagem" src="" alt="Foto do profissional">
                </div>

                <div class="informacoes-profissional">

                    <h1 id="nome"></h1>

                    <h2 id="profissao"></h2>

                    <div class="informacoes">

                        <p><strong>📍 Cidade:</strong> <span id="cidade"></span></p>

                        <p><strong>⭐ Avaliação:</strong> <span id="avaliacao"></span></p>

                        <p><strong>💼 Experiência:</strong> <span id="experiencia"></span></p>

                        <p><strong>🏗 Especialidade:</strong> <span id="especialidade"></span></p>

                    </div>

                </div>

            </div>

            <div class="descricao">

                <h2>Sobre o profissional</h2>

                <p id="descricao"></p>

            </div>

            <div class="contato">

                <h2>Contato</h2>

                <p><strong>📞 Telefone:</strong> <span id="telefone"></span></p>

                <p><strong>📧 E-mail:</strong> <span id="email"></span></p>

            </div>

        </section>

    </main>

    <footer class="rodapé">
        <p>©IncomeOfHouses. Todos os direitos reservados.</p>

        <a href="../pages/TermosUso.html">Termos de Uso</a>

        <a href="../pages/PoliticaPrivacidade.html">Política de Privacidade</a>
    </footer>

    <script src="../js/perfilProfissionais.js"></script>

</body>

</html>
