<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Planta</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header class="topo">
        <nav class="menu">
            <a href="../index.html">Início</a>
            <a href="./Plantas.html" class="ativo">Plantas</a>
            <a href="./Profissionais.html">Profissionais</a>
            <a href="./Sobre.html">Sobre</a>

    <main class="detalhes">

                    <div class="item">

                    <div class="item">
                        <h3>Garagem</h3>
                        <p id="garagem"></p>
                    </div>

                    <div class="item">
                        <h3>Terreno</h3>
                        <p id="terreno"></p>
                    </div>

                    <div class="item">
                        <h3>Estilo</h3>
