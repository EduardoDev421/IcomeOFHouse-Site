<!DOCTYPE html>
<html lang="pt-br">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="description" content="IncomeofHouses - Site de renda passiva com imóveis">
   <link rel="stylesheet" href="../css/style.css">
   <title>Pagina de Login</title>
</head>
<body>
   <header class="topo">
      <div class="logo">
         <img src="" alt="Logo Income of Houses">
      </div>
      <nav class="menu">
         <a href="../index.html">Início</a>
         <a href="../pages/Plantas.html">Plantas</a>
         <a href="../pages/Profissionais.html">Profissionais</a>
         <a href="../pages/Sobre.html" class="ativo">Sobre</a>
      </nav>
   </header>

         <!-- Conteúdo Login -->
         <main class="container pagina-auth">
            <section class="bloco-auth">
            <h1>Logar</h1>

            <div>
               <img src="" alt="iconeLogin" href="" class="iconelogin">
            </div>

            <form class="form-auth" id="formLogin">

               <label for="emailLogin">E-mail</label>
               <input type="email" id="emailLogin" placeholder="Digite seu e-mail" required>
               
               <label for="senhaLogin">Senha</label>
               <input type="password" id="senhaLogin" placeholder="Digite sua senha" required>

               <button type="submit" class="btn-primario">Entrar</button>

               <p class="link-auth">
               Não possui um cadastro? <a href="cadastro.html">Cadastre-se</a>
               <a href="EsqueceuSenha.html">Esqueceu a senha?</a>
               </p>
            </form>
            </section>
         </main>
   <footer class="rodapé">
      <p>©IncomeOfHouses.Todos os direitos reservados.</p>
      <a href="../pages/TermosUso.html">Termos de Uso</a>
      <a href="../pages/PoliticaPrivacidade.html">Política de Privacidade</a>
   </footer>
</body>
</html>
